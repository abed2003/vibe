<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#10141a" />
    <meta name="description" content="TikVibe social video PWA" />
    <title>TikVibe</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('tikvibe.theme');
          var theme = stored || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.className = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.className = 'dark';
        }
      })();
    </script>
    <link rel="icon" href="/pwa.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/pwa.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
